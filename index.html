<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="meta.title"></title>
    <link rel="stylesheet" href="css/main.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a
          class="brand-link"
          href="#home"
          data-nav-target="home"
          data-i18n-attr="aria-label:brand.homeLabel"
        >
          <span class="brand-mark" data-i18n="brand.mark" aria-hidden="true"></span>
          <span class="brand-name" data-i18n="brand.name"></span>
        </a>

        <div class="header-controls">
          <div class="language-switch" role="group" data-i18n-attr="aria-label:language.label">
            <button
              class="language-option"
              type="button"
              data-language-option="english"
              data-i18n="language.english"
              aria-pressed="true"
            ></button>
            <button
              class="language-option"
              type="button"
              data-language-option="spanish"
              data-i18n="language.spanish"
              aria-pressed="false"
            ></button>
          </div>
        </div>
      </header>

      <main id="app" class="site-main">
        <section
          class="page-section page-section--active"
          data-page="home"
          data-i18n-attr="aria-label:pages.home"
        >
          <div class="home-page">
            <div class="home-visual" data-i18n-attr="aria-label:home.artworkLabel">
              <div class="rotating-artwork" aria-hidden="true">
                <div class="artwork-side artwork-side--front">
                  <img
                    class="artwork-image"
                    data-home-artwork="front"
                    src="images/home/colibri.png"
                    alt=""
                  >
                </div>
                <div class="artwork-side artwork-side--back">
                  <img
                    class="artwork-image"
                    data-home-artwork="back"
                    data-src="images/home/malla1.png"
                    data-fallback-src="images/home/colibri.png"
                    alt=""
                  >
                </div>
              </div>
            </div>

            <div class="home-content">
              <div class="home-actions" data-i18n-attr="aria-label:home.actionsLabel">
                <button class="home-action" type="button" data-nav-target="about" data-i18n="home.actions.about"></button>
                <button class="home-action" type="button" data-nav-target="catalog" data-i18n="home.actions.catalog"></button>
                <button class="home-action" type="button" data-nav-target="contact" data-i18n="home.actions.contact"></button>
              </div>
            </div>
          </div>
        </section>
        <section
          class="page-section"
          data-page="about"
          data-i18n-attr="aria-label:pages.about"
          hidden
        >
          <div class="about-page">
            <header class="about-intro">
              <p class="section-kicker" data-i18n="about.kicker"></p>
              <h1 class="section-title" data-i18n="about.title"></h1>
              <p class="section-lead" data-i18n="about.lead"></p>
            </header>

            <div class="about-sections">
              <article class="about-section">
                <figure class="about-figure">
                  <img
                    class="about-image"
                    data-placeholder-image
                    src="images/about/our-story-placeholder.webp"
                    alt=""
                    loading="lazy"
                  >
                </figure>
                <div class="about-copy">
                  <h2 data-i18n="about.sections.story.title"></h2>
                  <p data-i18n="about.sections.story.text"></p>
                </div>
              </article>

              <article class="about-section">
                <figure class="about-figure">
                  <img
                    class="about-image"
                    data-placeholder-image
                    src="images/about/experience-placeholder.webp"
                    alt=""
                    loading="lazy"
                  >
                </figure>
                <div class="about-copy">
                  <h2 data-i18n="about.sections.experience.title"></h2>
                  <p data-i18n="about.sections.experience.text"></p>
                </div>
              </article>

              <article class="about-section">
                <figure class="about-figure">
                  <img
                    class="about-image"
                    data-placeholder-image
                    src="images/about/sketch-to-performance-placeholder.webp"
                    alt=""
                    loading="lazy"
                  >
                </figure>
                <div class="about-copy">
                  <h2 data-i18n="about.sections.sketch.title"></h2>
                  <p data-i18n="about.sections.sketch.text"></p>
                </div>
              </article>

              <article class="about-section">
                <figure class="about-figure">
                  <img
                    class="about-image"
                    data-placeholder-image
                    src="images/about/design-process-placeholder.webp"
                    alt=""
                    loading="lazy"
                  >
                </figure>
                <div class="about-copy">
                  <h2 data-i18n="about.sections.process.title"></h2>
                  <p data-i18n="about.sections.process.text"></p>
                </div>
              </article>

              <article class="about-section">
                <figure class="about-figure">
                  <img
                    class="about-image"
                    data-placeholder-image
                    src="images/about/made-in-peru-placeholder.webp"
                    alt=""
                    loading="lazy"
                  >
                </figure>
                <div class="about-copy">
                  <h2 data-i18n="about.sections.peru.title"></h2>
                  <p data-i18n="about.sections.peru.text"></p>
                </div>
              </article>

              <article class="about-section">
                <figure class="about-figure">
                  <img
                    class="about-image"
                    data-placeholder-image
                    src="images/about/designed-for-world-placeholder.webp"
                    alt=""
                    loading="lazy"
                  >
                </figure>
                <div class="about-copy">
                  <h2 data-i18n="about.sections.world.title"></h2>
                  <p data-i18n="about.sections.world.text"></p>
                </div>
              </article>
            </div>
          </div>
        </section>
        <section
          class="page-section"
          data-page="catalog"
          data-i18n-attr="aria-label:pages.catalog"
          hidden
        >
          <div class="catalog-page">
            <div class="catalog-toolbar">
              <button class="catalog-home-button" type="button" data-nav-target="home" aria-label="Home">
                <img src="images/home/hummingbird-placeholder.webp" alt="">
              </button>
              <button class="catalog-category-toggle" type="button" data-catalog-category-toggle aria-pressed="false">
                <span data-catalog-category-toggle-label></span>
              </button>
            </div>

            <article class="catalog-product" data-i18n-attr="aria-label:catalog.productLabel">
              <figure class="catalog-product-media" data-brush-reveal>
                <img
                  class="catalog-product-image"
                  data-placeholder-image
                  src=""
                  alt=""
                  loading="lazy"
                  data-catalog-image
                >
              </figure>

              <div class="catalog-product-details" data-catalog-details-panel>
                <div class="catalog-product-heading">
                  <h2 data-catalog-name></h2>
                  <p data-catalog-description></p>
                </div>

                <div class="catalog-control-group">
                  <p class="catalog-control-label" data-i18n="catalog.controls.colors"></p>
                  <div class="catalog-swatches" role="group" data-i18n-attr="aria-label:catalog.controls.colors">
                    <button class="catalog-swatch" type="button" data-catalog-swatch data-color-index="0"></button>
                    <button class="catalog-swatch" type="button" data-catalog-swatch data-color-index="1"></button>
                    <button class="catalog-swatch" type="button" data-catalog-swatch data-color-index="2"></button>
                    <button class="catalog-swatch" type="button" data-catalog-swatch data-color-index="3"></button>
                  </div>
                </div>

                <div class="catalog-control-group">
                  <p class="catalog-control-label" data-i18n="catalog.controls.sizes"></p>
                  <div class="catalog-size-group">
                    <p class="catalog-size-group-label" data-i18n="catalog.controls.childSizes"></p>
                    <div class="catalog-sizes" role="group" data-i18n-attr="aria-label:catalog.controls.sizes">
                      <button class="catalog-size-option" type="button" data-catalog-size="CXXS" aria-pressed="false">CXXS</button>
                      <button class="catalog-size-option" type="button" data-catalog-size="CXS" aria-pressed="false">CXS</button>
                      <button class="catalog-size-option" type="button" data-catalog-size="CS" aria-pressed="false">CS</button>
                      <button class="catalog-size-option" type="button" data-catalog-size="CM" aria-pressed="true">CM</button>
                      <button class="catalog-size-option" type="button" data-catalog-size="CL" aria-pressed="false">CL</button>
                    </div>
                  </div>
                  <div class="catalog-size-group">
                    <p class="catalog-size-group-label" data-i18n="catalog.controls.adultSizes"></p>
                    <div class="catalog-sizes" role="group" data-i18n-attr="aria-label:catalog.controls.sizes">
                      <button class="catalog-size-option" type="button" data-catalog-size="AXS" aria-pressed="false">AXS</button>
                      <button class="catalog-size-option" type="button" data-catalog-size="AS" aria-pressed="false">AS</button>
                      <button class="catalog-size-option" type="button" data-catalog-size="AM" aria-pressed="false">AM</button>
                      <button class="catalog-size-option" type="button" data-catalog-size="AL" aria-pressed="false">AL</button>
                      <button class="catalog-size-option" type="button" data-catalog-size="AXXL" aria-pressed="false">AXXL</button>
                    </div>
                  </div>
                </div>

                <div class="catalog-actions">
                  <button
                    class="catalog-action"
                    type="button"
                    data-catalog-customize-toggle
                    aria-expanded="false"
                    aria-controls="catalog-customization"
                    data-i18n="catalog.controls.customize"
                  ></button>
                  <div class="catalog-customization" id="catalog-customization" hidden>
                    <textarea
                      class="catalog-customization-field"
                      data-catalog-customization
                      rows="5"
                      data-i18n-attr="placeholder:catalog.controls.customizationPlaceholder;aria-label:catalog.controls.customizationPlaceholder"
                    ></textarea>
                  </div>
                  <button
                    class="catalog-action catalog-action--primary"
                    type="button"
                    data-whatsapp-order
                    data-i18n="catalog.controls.order"
                  ></button>
                </div>
              </div>

              <button class="catalog-mobile-details-toggle" type="button" data-catalog-details-toggle aria-expanded="false">
                <span data-i18n="catalog.controls.details"></span>
              </button>
            </article>
          </div>
        </section>
        <section
          class="page-section"
          data-page="contact"
          data-i18n-attr="aria-label:pages.contact"
          hidden
        >
          <div class="contact-page">
            <header class="contact-intro">
              <p class="section-kicker" data-i18n="contact.kicker"></p>
              <h1 class="section-title contact-title" data-i18n="contact.title"></h1>
              <p class="section-lead" data-i18n="contact.lead"></p>
            </header>

            <div class="contact-grid">
              <article class="contact-card">
                <h2 data-i18n="contact.contactMethods.title"></h2>
                <a class="contact-link" href="https://wa.me/" target="_blank" rel="noreferrer" data-i18n="contact.contactMethods.whatsapp"></a>
                <a class="contact-link" href="mailto:hello@qinti.com" data-i18n="contact.contactMethods.email"></a>
              </article>

              <article class="contact-card">
                <h2 data-i18n="contact.visit.title"></h2>
                <p class="contact-detail" data-i18n="contact.visit.address"></p>
                <p class="contact-detail" data-i18n="contact.visit.hours"></p>
                <p class="contact-detail" data-i18n="contact.visit.social"></p>
                <div class="contact-map" aria-label="Map placeholder">
                  <span data-i18n="contact.visit.map"></span>
                </div>
              </article>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div class="floating-actions" aria-label="Quick contact">
      <a class="floating-action floating-action--email" href="mailto:hello@qinti.com" data-i18n="contact.floating.email"></a>
      <button class="floating-action floating-action--whatsapp" type="button" data-floating-whatsapp data-i18n="contact.floating.whatsapp"></button>
    </div>
